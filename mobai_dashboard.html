          normA += vecA[i] * vecA[i];
          normB += vecB[i] * vecB[i];

        normB = Math.sqrt(normB);
        return normA === 0 || normB === 0 ? 0 : dotProduct / (normA * normB);

        for (let [offNoteClass, mechanisms] of Object.entries(g)) {
          let scores = Object.values(mechanisms);
          let avg = scores.reduce((sum, s) => sum + s, 0) / scores.length;
          let minScore = Math.min(...scores);
          let gap = minScore < 60;
          let recommendation = minScore < 50 
            ? "Critical gap — consider adding competitive receptor blockers like vanillin or sodium chloride." 
            : minScore < 70 
              ? "Minor gap in physical entrapment — increase KGM concentration to 0.3-0.5%." 
              : "Excellent coverage across all masking mechanisms.";
          results.push({
            offNoteClass, mechanisms, overallCoverage: Number(avg.toFixed(1)), gapIdentified: gap, recommendation
          });
        }
        return results;
      }

      function calculateMaskingScores(ingredients) {
        let scores = {};
        for (let offNoteClass of Object.keys(h)) {
          let targets = h[offNoteClass], activeCompounds = ingredients.flatMap(ing => m[ing] || []), sumSim = 0, count = 0;
          for (let target of targets) {
            let tComp = compoundDatabase[target];
            if (!tComp) continue;
            let tVec = getCompoundVector(tComp);
            for (let active of activeCompounds) {
              let aComp = compoundDatabase[active];
              if (!aComp) continue;
              let aVec = getCompoundVector(aComp);
              sumSim += cosineSimilarity(tVec, aVec);
              count++;
            }
          }
          scores[offNoteClass] = count > 0 ? Number((sumSim / count * 100).toFixed(1)) : 0;
        }
        return scores;
      }

      function calculateAdjacentTerritory(ingredient) {
        let compounds = m[ingredient];
        if (!compounds) return null;
        let centroids = ["mango", "jasmine", "coconut", "milk_tea"].map(getIngredientVector), len = centroids[0].length, avgCentroid = Array(len).fill(0);
        for (let c of centroids) {
          for (let i = 0; i < len; i++) avgCentroid[i] += c[i];
        }
        for (let i = 0; i < len; i++) avgCentroid[i] /= centroids.length;
        let pairingScore = cosineSimilarity(getIngredientVector(ingredient), avgCentroid);
        let maskingScores = calculateMaskingScores([ingredient]);
        let avgMasking = Object.values(maskingScores).reduce((sum, s) => sum + s, 0) / Object.values(maskingScores).length;
        let distance = 1 - pairingScore, compositeScore = 0.4 * pairingScore + (avgMasking / 100) * 0.4 + 0.2 * distance;
        return {
          ingredient, pairingScore: Number(pairingScore.toFixed(4)), maskingCoverage: maskingScores, avgMaskingScore: Number(avgMasking.toFixed(1)), compositeScore: Number(compositeScore.toFixed(4)), compounds
        };
      }

      function buildGraph(ingredients) {
        let nodes = [], edges = [], addedMolecules = new Set(), count = ingredients.length;
        ingredients.forEach((ing, index) => {
          let angle = 2 * Math.PI * index / count - Math.PI / 2;
          nodes.push({
            id: ing, type: "ingredient", x: 400 + 220 * Math.cos(angle), y: 300 + 220 * Math.sin(angle), connections: []
          });
          let compounds = m[ing] || [];
          compounds.forEach((comp, idx) => {
            if (!addedMolecules.has(comp)) {
              let mAngle = angle + (idx - compounds.length / 2) * 0.15, distance = 100 + Math.random() * 80;
              nodes.push({
                id: comp, type: "molecule", x: 400 + distance * Math.cos(mAngle), y: 300 + distance * Math.sin(mAngle), connections: []
              }), addedMolecules.add(comp);
            }
            edges.push({
              source: ing, target: comp, type: "contains"
            });
          });
        });
        let molecules = [...addedMolecules];
        for (let i = 0; i < molecules.length; i++) {
          for (let j = i + 1; j < molecules.length; j++) {
            let compA = compoundDatabase[molecules[i]], compB = compoundDatabase[molecules[j]];
            if (compA && compB) {
              let shared = compA.categories.filter(c => compB.categories.includes(c));
              if (shared.length >= 3) {
                edges.push({
                  source: molecules[i], target: molecules[j], type: "co_occurs"
                });
              }
            }
          }
        }
        return { nodes, edges };
      }

      // --- SIMULATION PIPELINE LOGIC ---
      function simulateConsumerSignals(inputs) {
        let complaintLower = inputs.complaint.toLowerCase(), regionMetrics = regionalPriors[inputs.region];
        let bitterness = clamp(48 + (complaintLower.includes("bitter") ? 24 : 0) + (complaintLower.includes("aftertaste") ? 12 : 0) + (inputs.proteinBase === "plant blend" ? 8 : 0));
        let chalkiness = clamp(inputs.chalkiness);
        let sweetness = inputs.sweetness === "low" ? 38 : inputs.sweetness === "creamy" ? 68 : regionMetrics.sweet;
        let texture = inputs.texture === "light" ? 82 : inputs.texture === "silky" ? 66 : 48;
        let teaFamiliarity = clamp(regionMetrics.tea + (inputs.teaProfile.includes("tea") ? 6 : 0) + (inputs.flavorDirection === "coconut-milk-tea" ? 4 : 0));
        let repeatIntent = clamp(100 - bitterness * 0.28 - chalkiness * 0.22 + teaFamiliarity * 0.35 + texture * 0.2);
        return {
          bitterness, chalkiness, sweetness, texture, teaFamiliarity, repeatIntent, novelty: regionMetrics.novelty
        };
      }

      function generateRecommendation(inputs) {
        let concept = concepts[inputs.flavorDirection];
        let pairing = inputs.flavorDirection === "mango-jasmine" ? calculatePairing("mango", "jasmine") : calculatePairing("coconut", "milk_tea");
        let masking = calculateMaskingScores([...concept.ingredients]);
        let avgMasking = Object.values(masking).reduce((sum, s) => sum + s, 0) / Object.values(masking).length;
        let signals = simulateConsumerSignals(inputs);
        let rawScore = pairing.score * 42 + avgMasking * 0.28 + signals.teaFamiliarity * 0.17 + signals.repeatIntent * 0.13 - inputs.chalkiness * 0.08;
        let confidence = clamp(rawScore + 7);
        let strategy = inputs.flavorDirection === "mango-jasmine" 
          ? "Use floral linalool and benzyl acetate to bridge mango esters with tea aromatics, then apply light acidity to reduce whey heaviness." 
          : "Use coconut lactones to round protein edges while roasted tea pyrazines create a familiar milk-tea anchor and suppress sulfur perception.";
        let rationale = `${concept.name} is recommended for ${inputs.region} because it balances ${inputs.teaProfile} familiarity with ${inputs.texture} texture expectations and addresses ${Math.round(signals.chalkiness)}% chalkiness pressure.`;
        return {
          concept, pairing, masking, avgMasking, confidence: clamp(confidence), strategy, rationale
        };
      }

            </div>
            <div className="simulation-kpis">
              <span>Run<strong>{simulationRun > 0 ? `#${simulationRun}` : "-"}</strong></span>
              <span>Concept<strong>{recommendation.concept.name}</strong></span>
              <span>Texture<strong>{inputs.texture}</strong></span>
              <span>Tea route<strong>{inputs.teaProfile}</strong></span>
            </div>
          </aside>
        );
      }

      // --- MAIN APPLICATION COMPONENT ---
      function App() {
        const [inputs, setInputs] = React.useState(initialInputs);
        const [activeNode, setActiveNode] = React.useState("linalool");
        const [simulationRun, setSimulationRun] = React.useState(0);

        const signals = React.useMemo(() => simulateConsumerSignals(inputs), [inputs]);
        const recommendation = React.useMemo(() => generateRecommendation(inputs), [inputs]);
        const graph = React.useMemo(() => buildGraph(getIngredientsList(inputs.flavorDirection)), [inputs.flavorDirection]);
        const maskingResults = React.useMemo(() => calculateOffNoteCoverage(), []);
        
        const adjacentVariants = React.useMemo(() => {
          return adjacentVariantsList.slice(0, 5).map(v => calculateAdjacentTerritory(v.ingredient)).filter(Boolean);
        }, []);

        const onSimulate = (direction) => {
          setInputs(prev => ({
            ...prev,
            flavorDirection: direction,
            teaProfile: direction === "mango-jasmine" ? "jasmine tea" : "milk tea",
            sweetness: direction === "mango-jasmine" ? "balanced" : "creamy",
            texture: direction === "mango-jasmine" ? "light" : "silky",
            occasion: direction === "mango-jasmine" ? "weekday morning" : "afternoon recharge"
          }));
          setActiveNode(direction === "mango-jasmine" ? "linalool" : "delta-decalactone");
          setSimulationRun(prev => prev + 1);
          window.setTimeout(() => {
            const el = document.getElementById("simulation-output");
            if (el) el.scrollIntoView({ behavior: "smooth" });
          }, 80);
        };

        return (
          <React.Fragment>
            <NavBar />
            <section className="hero-section">
              <div className="hero-copy">
                <p className="eyebrow">MoBai AI Formulation Studio</p>
                <h1>High-protein RTD beverages, formulated with flavor intelligence.</h1>
                <p>A proof-of-concept R&D dashboard that turns consumer complaints, regional preferences, volatile compound logic, and masking rules into believable beverage recommendations.</p>
                <div className="hero-actions">
                  <a href="#studio" className="primary-button">Run AI pipeline</a>
                  <a href="#graph" className="secondary-button">Inspect flavor graph</a>
                </div>
              </div>
              <div className="hero-visual" aria-label="MoBai AI dashboard preview">
                <div className="hero-panel">
                  <span>Compatibility</span>
                  <strong>{Math.round(recommendation.pairing.score * 100)}%</strong>
                  <small>{recommendation.pairing.validation}</small>
                </div>
                <div className="mini-network">
                  {["Mango", "Jasmine", "Tea", "Whey", "Masking"].map((name, i) => (
                    <div key={name} className={`network-node n${i}`}>{name}</div>
                  ))}
                </div>
              </div>
            </section>

            <section className="studio-grid" id="studio">
              <InputPanel inputs={inputs} setInputs={setInputs} />
              <IntelligencePanel signals={signals} inputs={inputs} />
            </section>

            <section className="section two-column">
              <SentimentPanel signals={signals} />
              <RecommendationPanel recommendation={recommendation} inputs={inputs} simulationRun={simulationRun} />
            </section>

            <section className="section" id="graph">
              <SectionHeader 
                label="Molecular compatibility engine" 
                title="Interactive FlavorGraph" 
                description="A simplified Morgan fingerprint and Tanimoto-style similarity simulation using volatile compounds, shared categories, and masking relationships." 
              />
              <div className="graph-layout">
                <FlavorGraph graph={graph} activeNode={activeNode} setActiveNode={setActiveNode} />
                <NodeInspector nodeId={activeNode} inputs={inputs} />
              </div>
            </section>

            <section className="section two-column">
              <MaskingPanel maskingResults={maskingResults} recommendation={recommendation} />
              <ValidationPanel confidence={recommendation.confidence} signals={signals} />
            </section>

            <section className="section" id="concepts">
              <SectionHeader 
                label="Concept showcase" 
                title="Final FMCG product concepts" 
                description="Two hero RTD concepts designed for lighter, tea-inspired, high-protein nutrition in Asia." 
              />
              <div className="product-grid">
                {Object.keys(concepts).map(key => (
                  <ProductCard 
                    key={key} 
                    productKey={key} 
                    active={inputs.flavorDirection === key} 
                    onSimulate={onSimulate} 
                  />
                ))}
              </div>
              <SimulationOutput inputs={inputs} recommendation={recommendation} simulationRun={simulationRun} />
            </section>

            <section className="section">
              <SectionHeader 
                label="White-space extensions" 
                title="AI-suggested adjacent flavor territories" 
                description="Candidate concepts scored against the MoBai molecular centroid and protein off-note masking model." 
              />
              <div className="variant-grid">
                {adjacentVariants.map(v => v && (
                  <div key={v.ingredient} className="variant-card">
                    <span>{formatName(v.ingredient)}</span>
                    <strong>{Math.round(v.compositeScore * 100)}%</strong>
                    <p>{v.compounds.slice(0, 3).join(", ")}</p>
                  </div>
                ))}
              </div>
            </section>
          </React.Fragment>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(
        <React.StrictMode>
          <App />
        </React.StrictMode>
      );
    </script>
  </body>
</html>
